name: CI
# Authority: CI
# Target: Physical Compute Node (Trashcan)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  merge_group:
    types: [checks_requested]

jobs:
  governance:
    name: Governance Check
    runs-on: self-hosted
    steps:
