name: CI
# Authority: CI
# Target: Physical Compute Node (Trashcan)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  merge_group:
    types: [checks_requested]

jobs:
  governance:
    name: Governance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Codeowners
        run: |
          if [ ! -f .github/CODEOWNERS ]; then
            echo "::error::CODEOWNERS file missing. Violation of Tier 0 Governance."
            exit 1
          fi

  system-integrity:
    name: Nix Flake Verification
    runs-on: ubuntu-latest
    needs: governance
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      
      - name: Inject CI Identity
        run: |
          echo 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAACI_DUMMY_KEY_FOR_CI_CHECK_ONLY ci@yutila' > hosts/trashcan/admin.keys
          git add -f hosts/trashcan/admin.keys
        
      - name: Hardware Syntax Check
        run: nix flake check --show-trace
